self_path: /src/landing/testing_configs/cp2_setup_example.yml

#TGEN SECTION
enable_tgen: true
tgen_clients:
    configs:
      tgen_request_section_1:
        total: 5
        type: mastodon
        profiles:
          mastodon_lurker:
            profile: config_lurker_1.json
            percent: 30
          mastodon_influncer:
            profile: config_influencer_1.json
            percent: 70
      tgen_request_section_2:
        total: 5
        type: dns
        profiles:
          dns_lurker:
            profile: config_slow_1.json
            percent: 30
          dns_influncer:
            profile: config_fast_1.json
            percent: 70
      tgen_request_section_3:
        total: 1
        type: mastodon_monitor
        profiles:
          monitor:
            profile: config_monitor.json
            percent: 100

# ENV MANAGEMENT
image:
  tag: "cp2"
  repo: ""

env: pwnd_test

#MASTODON SECTION
mastodon_server:
  common_name: "mastodon"
  server_fqdn: "mastodon.pwnd.com"
  username_prefix: "user" #All users will be called meow#
  user_quantity: 50 #Makes 50 users meow1-meow50 

#APPLICATION SECTION
application:
  destini:
    jpeg_covers: jpeg-covers-25-jpg.tar
  iodine:
    max_query_length: 255
    max_response_size: 512
  alice:
    mastodon_user: alice
    raceboat_prof_config: config_post_only.json
    raceboat_prof: client_timeline_builder.json
  bob:
    mastodon_user: bob
    raceboat_prof_config: config_download_only.json
    raceboat_prof: server_timeline_builder.json

#TESTING SECTION
testing:
  test_id: cp2_test_1
  exfil_dir: test_input
  iterations: 3

#PCAP
pcap_section:
  - name: user_alice
    interface: eth0
  - name: user_alice
    interface: dns0
  - name: user_bob
    interface: eth0
  - name: user_bob
    interface: dns0
  - name: router
    interface: eth0
  - name: router
    interface: eth1

# BASELINE
adversary_phase0:
  vantage_points:
    router_post_nat:
      scripts:
        - name: bin_calculator
          params:
            json_path: "/baselines/cp2_setup_example.json" # if you change this file path, update in adversary_phase1 > router_post_nat > bin_loader script

#ZEEK
adversary_phase1:
  vantage_points:
    router_pre_nat:
      scripts:
        - name: cumulative/dns_query_count
          params:
            dns_q_threshold: 100
        - name: cumulative/dns_query_bytes
          params:
            dns_byte_threshold: 1000
        - name: cumulative/dns_response_bytes
          params:
            dns_resp_byte_threshold: 5000
        - name: cumulative/https_connection_count
          params:
            https_conn_threshold: 10
        - name: cumulative/https_upload_bytes
          params:
            https_upload_byte_threshold: 5000
    router_post_nat:
      scripts:
        - name: bin_loader
          params:
            json_path: "/baselines/cp2_setup_example.json" # baseline json
        - name: moving_average/average_dns_query_rate
          params:
            s: 10secs
            m: 6
            k: 1.15
            n: 3
        - name: moving_average/average_dns_query_size
          params:
            s: 10secs
            m: 6
            k: 1.15
            n: 3
        - name: moving_average/average_dns_response_size
          params:
            s: 10secs
            m: 6
            k: 1.15
            n: 3
        - name: moving_average/average_https_upload_rate
          params:
            s: 10secs
            m: 6
            k: 1.15
            n: 3
        - name: cumulative/dns_query_count
          params:
            dns_q_threshold: 100
        - name: cumulative/dns_query_bytes
          params:
            dns_byte_threshold: 1000
        - name: cumulative/dns_response_bytes
          params:
            dns_resp_byte_threshold: 5000
        - name: cumulative/https_connection_count
          params:
            https_conn_threshold: 10
        - name: cumulative/https_upload_bytes
          params:
            https_upload_byte_threshold: 5000


#TC NETWORKING
