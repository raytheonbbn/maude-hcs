# DO NOT TOUCH >:(
# services
services:
  adversary:
    build_dir: /src/docker/adversary
    image_name: adversary
    containers:
      - zeek
  tgen:
    build_dir: /src
    image_name: tgen
    containers:
      - tgen
  bind:
    build_dir: /src/docker/bind
    image_name: bind
    containers:
      - router
      - public_dns
      - root_dns
      - tld_dns
      - auth_dns
  iodine:
    build_dir: /src/docker/iodine
    image_name: iodine
  raceboat:
    build_dir: /src
    image_name: raceboat
    containers:
      - raceboat_server
      - raceboat_client
  application:
    build_dir: /src/application/src
    image_name: application
    containers:
      - user_bob
      - user_alice 

mastodon_containers:
  - mastodon_proxy
  - mastodon_db
  - mastodon_redis
  - mastodon_web
  - mastodon_streaming
  - mastodon_sidekiq

network_topology:
  internet:
    - router
    - public_dns
    - root_dns
    - tld_dns
    - auth_dns
    - user_bob
    - mastodon_proxy
  corp: 
    - router
    - tgen
    - user_alice
  mastodon:
    - mastodon_proxy
    - mastodon_db
    - mastodon_redis
    - mastodon_web
    - mastodon_streaming
    - mastodon_sidekiq
  container_pods:
    user_bob:
      - raceboat_server
    user_alice:
      - raceboat_client


